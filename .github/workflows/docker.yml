name: Build docker image

on:
  push:
    paths:
      - 'Dockerfile'
    branches:
      - master
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get netboot.xyz webapp version
        id: webapp_version
        shell: bash
        run: |
          VERSION="${{ vars.NETBOOT_XYZ_WEBAPP_VERSION }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s https://api.github.com/repos/netbootxyz/webapp/releases/latest | jq -r .tag_name)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kelvinmo/netbootxyz
          # generate Docker tags based on the following events/attributes
          tags: |
            type=semver,pattern={{version}},value=${{ steps.webapp_version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.webapp_version.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NETBOOT_XYZ_WEBAPP_VERSION=${{ steps.webapp_version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
